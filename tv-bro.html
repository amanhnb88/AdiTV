<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator M3U BitTV Bro</title>
    <style>
        body { font-family: sans-serif; background-color: #222; color: #fff; padding: 20px; text-align: center; }
        textarea { width: 100%; max-width: 800px; height: 400px; background-color: #111; color: #00ffcc; border: 2px solid #555; padding: 10px; font-family: monospace; }
        button { padding: 10px 20px; font-size: 16px; background-color: #00ffcc; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; margin-bottom: 20px;}
        button:hover { background-color: #00cca3; }
    </style>
</head>
<body>

    <h2>🛠️ Generator Playlist BitTV ke M3U</h2>
    <p>Menggunakan Jalur VIP Anti-Blokir (jsDelivr CDN)</p>
    
    <button onclick="generateM3U()">Ambil & Ubah ke M3U</button>
    <br>
    <textarea id="hasil-m3u" placeholder="Hasil kode M3U akan muncul di sini..."></textarea>

    <script>
        // Kita ubah link GitHub mentah menjadi link CDN VIP (jsDelivr)
        // Jalur ini otomatis mengatasi masalah blokir dan CORS!
        const linkVIP = 'https://cdn.jsdelivr.net/gh/Bit-tv1/b@main/b.json';

        function generateM3U() {
            const textArea = document.getElementById('hasil-m3u');
            textArea.value = "Mencoba menarik data via jalur VIP, tunggu sebentar bro...";

            fetch(linkVIP)
                .then(async response => {
                    // Kita ambil datanya sebagai teks biasa dulu untuk diperiksa
                    const textData = await response.text(); 
                    
                    try {
                        // Coba jadikan JSON
                        const jsonData = JSON.parse(textData);
                        return jsonData;
                    } catch (e) {
                        // Jika ERROR lagi (isinya bukan JSON), skrip ini akan mencetak isi teksnya
                        // agar kita bisa melihat bentuk file HTML yang memblokirnya!
                        throw new Error("Isi file bukan JSON! Isinya: \n\n" + textData.substring(0, 150) + "...");
                    }
                })
                .then(data => {
                    let m3uText = "#EXTM3U\n";

                    // Mengurai JSON menjadi M3U
                    data.forEach(channel => {
                        m3uText += `#EXTINF:-1 tvg-name="${channel.name}" group-title="BitTV Otomatis", ${channel.name}\n`;
                        m3uText += `#EXTVLCOPT:http-user-agent=okhttp/4.9.2\n`;
                        m3uText += `${channel.url}|User-Agent=okhttp/4.9.2\n`;
                    });

                    // Cetak ke layar
                    textArea.value = m3uText;
                })
                .catch(error => {
                    textArea.value = "Yah error bro: " + error.message;
                });
        }
    </script>

</body>
</html>
