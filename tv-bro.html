<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitTV Player Custom</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            background-color: #0f0f0f; 
            color: #00ffcc; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px;
        }
        h2 { margin-bottom: 20px; }
        video { 
            width: 100%; 
            max-width: 800px; 
            border: 3px solid #00ffcc; 
            border-radius: 12px; 
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }
        .status { margin-top: 15px; font-size: 14px; color: #ffeb3b; }
    </style>
</head>
<body>

    <h2>📺 Live TV Custom Bro</h2>
    <video id="video-tv" controls autoplay></video>
    <div id="status-text" class="status">Menyiapkan video...</div>

    <script>
        var video = document.getElementById('video-tv');
        var statusText = document.getElementById('status-text');
        
        // Ini adalah LINK hasil tangkapanmu di PCAPdroid
        var streamUrl = 'https://v2.bittv.my.id/getb/T3N3cnhZNW1uU2ZpNWZlbmNlR3Yxdz09'; 

        if (Hls.isSupported()) {
            var hls = new Hls();
            
            statusText.innerText = "Mencoba memuat stream...";
            
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                statusText.innerText = "Stream berhasil dimuat! Selamat menonton.";
                video.play();
            });

            // Menangkap error jika server menolak
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    statusText.innerText = "Yah error bro: " + data.type;
                    statusText.style.color = "#ff5252";
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Khusus pengguna Safari / iOS
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                statusText.innerText = "Stream dimuat via Apple HLS.";
                video.play();
            });
        } else {
            statusText.innerText = "Browser kamu tidak mendukung pemutar ini.";
        }
    </script>

</body>
</html>
