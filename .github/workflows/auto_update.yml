name: Auto Update IPTV Tokens

on:
  schedule:
    # Waktu server GitHub menggunakan UTC. 
    # Jadwal ini (0 15 * * *) berarti jam 15:00 UTC, 
    # yang setara dengan jam 00:00 tengah malam Waktu Indonesia Timur (WIT).
    # Silakan ubah sesuai kebutuhan interval update-nya.
    - cron: '0 15 * * *'
  
  # Tambahkan ini supaya lu bisa menjalankan skrip secara manual lewat tombol "Run workflow" di GitHub
  workflow_dispatch: 

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    # Memberikan izin bot GitHub untuk melakukan commit dan push file baru
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # Tambahkan library lain di sini jika skrip scraper lu butuh (misal: bs4, lxml)

      - name: Jalankan Skrip Update Token
        run: python update_token.py

      - name: Commit & Push Hasil Playlist Baru
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          # Jika tidak ada perubahan token, git commit tidak akan error
          git commit -m "Auto-update token & bersihkan link mati [skip ci]" || echo "Tidak ada perubahan token hari ini"
          git push origin main
